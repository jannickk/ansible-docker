# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/ee/user/application_security/secret_detection/#customizing-settings
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
stages:
- test
- build-docker


variables:
  DOCKERHUB_USERNAME: $DOCKERHUB_USERNAME
  DOCKERHUB_PASSWORD: $DOCKERHUB_PASSWORD


sast:
  stage: test
  tags:
    - development
include:
- template: Security/SAST.gitlab-ci.yml

build-docker_ansible_generic:
  tags:
    - docker-build
  stage: build-docker
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY/massflows/devops/ansible-docker/ansible-generic:2.19.0 -f ansible-generic/Dockerfile .
    - docker push $CI_REGISTRY/massflows/devops/ansible-docker/ansible-generic:2.19.0

build-docker_ansible_kubespray:
  tags:
    - docker-build
  stage: build-docker
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY 
    - docker build -t $CI_REGISTRY/massflows/devops/ansible-docker/ansible-kubespray:2.16.14 -f ansible-kubespray/Dockerfile .
    - docker push $CI_REGISTRY/massflows/devops/ansible-docker/ansible-kubespray:2.16.14

build-docker_ansible_terraform:
  tags:
    - docker-build
  stage: build-docker
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY 
    - docker build -t $CI_REGISTRY/massflows/devops/ansible-docker/ansible-terraform:2.19.0 -f ansible-terraform/Dockerfile .
    - docker push $CI_REGISTRY/massflows/devops/ansible-docker/ansible-terraform:2.19.0

upload_ansbile_generic_docker:
  tags:
    - docker-build
  stage: build-docker
  script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD docker.io
    - docker build -t docker.io/jannickkappelmann/ansible:2.19.0-generic -f ansible-generic/Dockerfile .
    - docker push docker.io/jannickkappelmann/ansible:2.19.0-generic

upload_ansbile_kubespray_docker:
  tags:
    - docker-build
  stage: build-docker
  script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD docker.io
    - docker build -t docker.io/jannickkappelmann/ansible:2.16.14-kubespray -f ansible-kubespray/Dockerfile .
    - docker push docker.io/jannickkappelmann/ansible:2.16.14-kubespray

upload_ansbile_terraform_docker:
  tags:
    - docker-build
  stage: build-docker
  script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD docker.io
    - docker build -t docker.io/jannickkappelmann/ansible:2.19.0-terraform -f ansible-terraform/Dockerfile .
    - docker push docker.io/jannickkappelmann/ansible:2.19.0-terraform