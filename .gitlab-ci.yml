# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/ee/user/application_security/secret_detection/#customizing-settings
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
stages:
- test
- dockerhub
- gitlab_registry



variables:
  DOCKERHUB_USERNAME: $DOCKERHUB_USERNAME
  DOCKERHUB_PASSWORD: $DOCKERHUB_PASSWORD
  GENERIC_ANSIBLE_VERSION: 2.20.2
  KUBESPRAY_ANSIBLE_VERSION: 2.17.13


.docker_build_gitlab_registry:
  tags:
    - saas-linux-small-amd64
  image: docker:29
  services:
    - docker:29-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  stage: gitlab_registry
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --build-arg ANSIBLE_VERSION=$ANSIBLE_VERSION -t $CI_REGISTRY/$NAME_SPACE/$IMAGE_NAME:$IMAGE_TAG -f $FOLDER/Dockerfile .
    - docker push $CI_REGISTRY/$NAME_SPACE/$IMAGE_NAME:$IMAGE_TAG

.docker_build:
  tags:
    - saas-linux-small-amd64
  image: docker:29
  services:
    - docker:29-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  stage: dockerhub
  script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD docker.io
    - docker build --build-arg ANSIBLE_VERSION=$ANSIBLE_VERSION -t docker.io/$NAME_SPACE/$IMAGE_NAME:$IMAGE_TAG -f $FOLDER/Dockerfile .
    - docker push docker.io/$NAME_SPACE/$IMAGE_NAME:$IMAGE_TAG

sast:
  stage: test
  tags:
    - development
include:
- template: Security/SAST.gitlab-ci.yml

build-docker_ansible_generic:
  stage: gitlab_registry
  variables:
    ANSIBLE_VERSION: $GENERIC_ANSIBLE_VERSION
    NAME_SPACE: massflows/devops/ansible-docker
    IMAGE_NAME: ansible
    FOLDER: ansible-generic
    IMAGE_TAG: $GENERIC_ANSIBLE_VERSION-generic
  extends: .docker_build_gitlab_registry

build-docker_ansible_kubespray:
  stage: gitlab_registry
  extends: .docker_build_gitlab_registry
  variables:
    ANSIBLE_VERSION: $KUBESPRAY_ANSIBLE_VERSION
    NAME_SPACE: massflows/devops/ansible-docker
    IMAGE_NAME: ansible
    FOLDER: ansible-kubespray
    IMAGE_TAG: $KUBESPRAY_ANSIBLE_VERSION-kubespray

build-docker_ansible_terraform:
  stage: gitlab_registry
  extends: .docker_build_gitlab_registry
  variables:
    ANSIBLE_VERSION: $GENERIC_ANSIBLE_VERSION
    NAME_SPACE: massflows/devops/ansible-docker
    IMAGE_NAME: ansible
    FOLDER: ansible-terraform
    IMAGE_TAG: $GENERIC_ANSIBLE_VERSION-terraform

upload_ansible_generic_docker:
  stage: dockerhub
  extends: .docker_build
  variables:
    IMAGE_TAG: $GENERIC_ANSIBLE_VERSION-generic
    NAME_SPACE: jannickkappelmann
    IMAGE_NAME: ansible
    FOLDER: ansible-generic
    ANSIBLE_VERSION: $GENERIC_ANSIBLE_VERSION

upload_ansible_kubespray_docker:
  stage: dockerhub
  extends: .docker_build
  variables:
    IMAGE_TAG: $KUBESPRAY_ANSIBLE_VERSION-kubespray
    NAME_SPACE: jannickkappelmann
    IMAGE_NAME: ansible
    FOLDER: ansible-generic
    ANSIBLE_VERSION: $KUBESPRAY_ANSIBLE_VERSION

upload_ansible_terraform_docker:
  stage: dockerhub
  extends: .docker_build
  variables:
    IMAGE_TAG: $GENERIC_ANSIBLE_VERSION-terraform
    NAME_SPACE: jannickkappelmann
    IMAGE_NAME: ansible
    FOLDER: ansible-terraform
    ANSIBLE_VERSION: $GENERIC_ANSIBLE_VERSION